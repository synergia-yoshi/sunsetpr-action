name: SunsetPR AI Model Lifecycle Check
description: Detect deprecated OpenAI, Anthropic, and Gemini model IDs and API surfaces with official evidence.
author: SunsetPR
inputs:
  path:
    description: Repository path to scan
    required: false
    default: "."
  fail-on:
    description: "Failure threshold: never, deprecated, or retired"
    required: false
    default: "never"
  report:
    description: JSON report path
    required: false
    default: ".sunsetpr/report.json"
outputs:
  findings:
    description: Number of model findings
  runtime-checks:
    description: Number of unresolved dynamic model references
  api-deprecations:
    description: Number of deprecated API surface findings
  retired:
    description: Number of references to retired models
  deprecated:
    description: Number of references to deprecated models
  safe-auto-fixes:
    description: Number of findings with high-confidence code context and official replacement
  report:
    description: Absolute path to the generated JSON report
runs:
  using: node24
  main: dist/action/runner.js
branding:
  icon: alert-triangle
  color: orange
