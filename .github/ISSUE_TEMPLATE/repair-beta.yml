name: Request repair beta
description: Apply for an evidence-backed draft migration PR. Do not include private code or secrets.
title: "[Repair beta] "
labels:
  - repair-beta
body:
  - type: markdown
    attributes:
      value: |
        SunsetPR's repair beta is invitation-only. It creates draft PRs and never auto-merges. Do not paste code, credentials, environment values, or customer data into this public form.
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - OpenAI
        - Anthropic
        - Google Gemini
        - Multiple supported providers
    validations:
      required: true
  - type: dropdown
    id: language
    attributes:
      label: Repository language
      options:
        - TypeScript / JavaScript
        - Python
        - Both TypeScript and Python
    validations:
      required: true
  - type: dropdown
    id: repository
    attributes:
      label: Repository visibility
      options:
        - Private
        - Public
    validations:
      required: true
  - type: input
    id: public_url
    attributes:
      label: Public repository URL
      description: Optional. Leave blank for a private repository.
      placeholder: https://github.com/example/repository
  - type: textarea
    id: situation
    attributes:
      label: Migration situation
      description: Describe the model ID and deadline without pasting proprietary code.
      placeholder: We use a deprecated model through the official SDK and need a reviewed migration before...
    validations:
      required: true
  - type: dropdown
    id: intent
    attributes:
      label: If a draft PR passes CI, would you consider paying for continued monitoring and repairs?
      options:
        - Yes
        - Maybe; depends on the result
        - No; evaluating the free workflow only
    validations:
      required: true
  - type: checkboxes
    id: consent
    attributes:
      label: Safety confirmation
      options:
        - label: I did not include code, credentials, environment values, or customer data in this issue.
          required: true
        - label: I understand the beta creates draft PRs only and never auto-merges.
          required: true
