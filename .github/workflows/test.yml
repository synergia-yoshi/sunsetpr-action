name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run version:check
      - run: npm run catalog:check
      - run: npm run benchmark:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run benchmark
      - run: npm run pages:build
      - run: npm run pages:check
      - run: npm run package
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packaged-action
          path: dist/action
          if-no-files-found: error
      - name: Run packaged Action
        id: sunsetpr
        uses: ./
        with:
          path: test-fixture
          report: .sunsetpr/report.json
      - name: Verify Action contract
        env:
          FINDINGS: ${{ steps.sunsetpr.outputs.findings }}
          API_DEPRECATIONS: ${{ steps.sunsetpr.outputs['api-deprecations'] }}
          RUNTIME_CHECKS: ${{ steps.sunsetpr.outputs['runtime-checks'] }}
          SAFE_AUTO_FIXES: ${{ steps.sunsetpr.outputs['safe-auto-fixes'] }}
        run: |
          test "$FINDINGS" = "1"
          test "$API_DEPRECATIONS" = "0"
          test "$RUNTIME_CHECKS" = "1"
          test "$SAFE_AUTO_FIXES" = "1"
          node -e 'const report = require("./.sunsetpr/report.json"); if (report.summary.modelReferences !== 1 || report.summary.apiDeprecations !== 0 || report.summary.runtimeChecks !== 1) process.exit(1)'
